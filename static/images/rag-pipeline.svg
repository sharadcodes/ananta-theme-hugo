<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 128" width="440" height="128" role="img" aria-labelledby="title desc">
  <title id="title">RAG pipeline</title>
  <desc id="desc">Three steps: Retrieve, Augment, Generate</desc>
  <defs>
    <style>
      .box { fill: #f8f9fa; stroke: #0066cc; stroke-width: 2; }
      .txt { font-family: system-ui, -apple-system, Segoe UI, sans-serif; font-size: 15px; font-weight: 600; fill: #24292e; }
      .sub { font-size: 12px; font-weight: 400; fill: #57606a; }
      .arr { stroke: #57606a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#57606a"/>
    </marker>
  </defs>
  <rect class="box" x="12" y="36" width="108" height="56" rx="8"/>
  <text class="txt" x="66" y="64" text-anchor="middle">Retrieve</text>
  <text class="sub" x="66" y="82" text-anchor="middle">search / index</text>
  <line class="arr" x1="125" y1="64" x2="158" y2="64"/>
  <rect class="box" x="168" y="36" width="108" height="56" rx="8"/>
  <text class="txt" x="222" y="64" text-anchor="middle">Augment</text>
  <text class="sub" x="222" y="82" text-anchor="middle">prompt + context</text>
  <line class="arr" x1="281" y1="64" x2="314" y2="64"/>
  <rect class="box" x="324" y="36" width="108" height="56" rx="8"/>
  <text class="txt" x="378" y="64" text-anchor="middle">Generate</text>
  <text class="sub" x="378" y="82" text-anchor="middle">LLM output</text>
</svg>
